postgresqlHoppsApp:
  enabled: true
  nameOverride: hopps-app-postgresql
  auth:
    database: hopps
  # use bitnami legacy repository (https://news.broadcom.com/app-dev/broadcom-introduces-bitnami-secure-images-for-production-ready-containerized-applications)
  image:
    repository: bitnamilegacy/postgresql
  volumePermissions:
    image:
      repository: bitnamilegacy/os-shell
  metrics:
    image:
      repository: bitnamilegacy/postgres-exporter

