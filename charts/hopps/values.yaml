global:
  imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

azDocumentAi:
  replicaCount: 1
  # List of imagePullSecrets for private image repositories
  imagePullSecrets: []
  image:
    # ToDo: should also be globally configurable
    #registry: ghcr.io
    repository: ghcr.io/hopps-app/az-document-ai-service
    tag: ""
    pullPolicy: IfNotPresent
  envFrom: []
  #  - configMapRef:
  #      name: name
  envVars: []
    #- name: ENV_VAR
    #  value: value
  ingress:
    enabled: false
    annotations: {}
    ingressClassName: ~
    hosts:
      - host: chart-example.local
        paths:
          - path: /
            pathType: Prefix
    tls: []
    # - secretName: chart-example-tls
    #   hosts:
    #     - chart-example.local
  podAnnotations: {}
  podLabels: {}
  podSecurityContext: {}
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    runAsNonRoot: true
    runAsUser: 1000
    readOnlyRootFilesystem: true
    seccompProfile:
      type: RuntimeDefault
  service:
    type: ClusterIP
    annotations: {}
    labels: {}
    port: 8080
  strategy: {}
    # type: Recreate
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 100
    targetCPUUtilizationPercentage: 80
    # targetMemoryUtilizationPercentage: 80
  serviceMonitor:
    enabled: false
    namespace: ~
    scrapeInterval: 15s
    scrapeTimeout: 15s
  serviceAccount:
    create: true
    annotations: {}
    # ToDo: make fallback name unique
    name: az-document-ai
    automount: false
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  resources: {}
  #  requests:
  #    cpu: 100m
  #    memory: 256Mi
  #  limits:
  #    cpu: 100m
  #    memory: 256Mi
  # Node selector settings for scheduling the pod on specific nodes
  nodeSelector: {}
  # Tolerations settings for scheduling the pod based on node taints
  tolerations: []
  # Affinity settings for controlling pod scheduling
  affinity: {}
  livenessProbe:
    httpGet:
      path: /q/health/live
      port: management
      scheme: HTTP
    failureThreshold: 3
    periodSeconds: 20
    successThreshold: 1
    timeoutSeconds: 2
  readinessProbe:
    httpGet:
      path: /q/health/ready
      port: management
      scheme: HTTP
    failureThreshold: 3
    periodSeconds: 10
    successThreshold: 1
    timeoutSeconds: 1
  startupProbe:
    httpGet:
      scheme: HTTP
      path: /q/health/started
      port: management
    failureThreshold: 1
    periodSeconds: 5
    successThreshold: 1
    timeoutSeconds: 1
    initialDelaySeconds: 1
  volumes:
    - name: cache
      emptyDir: {}
  volumeMounts:
    - name: cache
      mountPath: /tmp

