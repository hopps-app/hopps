{{- if .Values.mailDev.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "hopps.greenmailFullname" . }}
  labels:
    {{- include "hopps.greenmailLabels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 3025
      targetPort: smtp
      protocol: TCP
      name: smtp
    - port: 3143
      targetPort: imap
      protocol: TCP
      name: imap
    - port: 8080
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "hopps.greenmailSelectorLabels" . | nindent 4 }}
{{- end }}
