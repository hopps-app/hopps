{{- if .Values.mailDev.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "hopps.roundcubeFullname" . }}
  labels:
    {{- include "hopps.roundcubeLabels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "hopps.roundcubeSelectorLabels" . | nindent 4 }}
{{- end }}
