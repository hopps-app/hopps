{{- if .Values.hoppsApp.bootstrap.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "hopps.hoppsAppFullname" . }}-bootstrap
  labels:
    {{- include "hopps.hoppsAppLabels" . | nindent 4 }}
data:
  bootstrap-data.yaml: |
    # Bootstrap Configuration (generated from Helm values)
    organizations:
      {{- if .Values.hoppsApp.bootstrap.organizations }}
      {{- range .Values.hoppsApp.bootstrap.organizations }}
      - name: {{ .name | quote }}
        slug: {{ .slug | quote }}
        {{- if .displayName }}
        displayName: {{ .displayName | quote }}
        {{- end }}
        {{- if .demo }}
        demo:
          {{- if .demo.members }}
          members:
            {{- range .demo.members }}
            - firstName: {{ .firstName | quote }}
              lastName: {{ .lastName | quote }}
              username: {{ .username | quote }}
              {{- if .email }}
              email: {{ .email | quote }}
              {{- end }}
              {{- if .phone }}
              phone: {{ .phone | quote }}
              {{- end }}
            {{- end }}
          {{- end }}
          {{- if .demo.bommels }}
          bommels:
            {{- range .demo.bommels }}
            - ref: {{ .ref | quote }}
              title: {{ .title | quote }}
              icon: {{ .icon | quote }}
              {{- if .parentRef }}
              parentRef: {{ .parentRef | quote }}
              {{- end }}
              {{- if .responsibleMember }}
              responsibleMember: {{ .responsibleMember | quote }}
              {{- end }}
            {{- end }}
          {{- end }}
          {{- if .demo.tags }}
          tags:
            {{- range .demo.tags }}
            - ref: {{ .ref | quote }}
              name: {{ .name | quote }}
            {{- end }}
          {{- end }}
          {{- if .demo.documents }}
          documents:
            {{- range .demo.documents }}
            - name: {{ .name | quote }}
              total: {{ .total | quote }}
              {{- if .totalTax }}
              totalTax: {{ .totalTax | quote }}
              {{- end }}
              {{- if .currencyCode }}
              currencyCode: {{ .currencyCode | quote }}
              {{- end }}
              date: {{ .date | quote }}
              {{- if .bommelRef }}
              bommelRef: {{ .bommelRef | quote }}
              {{- end }}
              {{- if .tagRefs }}
              tagRefs: {{ .tagRefs | quote }}
              {{- end }}
              {{- if .confirmed }}
              confirmed: {{ .confirmed }}
              {{- end }}
              {{- if .privatelyPaid }}
              privatelyPaid: {{ .privatelyPaid }}
              {{- end }}
              {{- if .createTransaction }}
              createTransaction: {{ .createTransaction }}
              {{- end }}
              {{- if .sender }}
              sender:
                name: {{ .sender.name | quote }}
                {{- if .sender.street }}
                street: {{ .sender.street | quote }}
                {{- end }}
                {{- if .sender.zipCode }}
                zipCode: {{ .sender.zipCode | quote }}
                {{- end }}
                {{- if .sender.city }}
                city: {{ .sender.city | quote }}
                {{- end }}
              {{- end }}
            {{- end }}
          {{- end }}
          {{- if .demo.transactions }}
          transactions:
            {{- range .demo.transactions }}
            - name: {{ .name | quote }}
              amount: {{ .amount | quote }}
              {{- if .currencyCode }}
              currencyCode: {{ .currencyCode | quote }}
              {{- end }}
              date: {{ .date | quote }}
              {{- if .bommelRef }}
              bommelRef: {{ .bommelRef | quote }}
              {{- end }}
            {{- end }}
          {{- end }}
        {{- end }}
      {{- end }}
      {{- else }}
      []
      {{- end }}

    users:
      {{- if .Values.hoppsApp.bootstrap.users }}
      {{- range .Values.hoppsApp.bootstrap.users }}
      - username: {{ .username | quote }}
        email: {{ .email | quote }}
        firstName: {{ .firstName | quote }}
        lastName: {{ .lastName | quote }}
        roles:
          {{- range .roles }}
          - {{ . | quote }}
          {{- end }}
        organizationSlug: {{ .organizationSlug | quote }}
      {{- end }}
      {{- else }}
      []
      {{- end }}
{{- end }}
